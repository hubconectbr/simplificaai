<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIMPLIFICA AI - Justiça Eleitoral</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Adicionado: Biblioteca PDF.js para extração local de texto -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-jus { background-color: #003366; }
        .text-jus { color: #003366; }
        .border-jus { border-color: #003366; }
        textarea, input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Scale: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 22 3 22 10"/><line x1="10" y1="14" x2="22" y2="3"/></svg>,
            Gemini: () => (
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 22C12 22 12 18 16 14C20 10 24 10 24 10C24 10 20 10 16 6C12 2 12 0 12 0C12 0 12 4 8 8C4 12 0 12 0 12C0 12 4 12 8 16C12 20 12 22 12 22Z" />
                </svg>
            ),
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            CheckCircle2: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Hash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        };

        const App = () => {
            const [activeModal, setActiveModal] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('simpai_key_final_v2') || '');
            const [guidelines, setGuidelines] = useState(localStorage.getItem('simpai_guidelines_v1') || '');
            const [editingGuidelines, setEditingGuidelines] = useState('');
            
            // Novos estados integrados
            const [inputText, setInputText] = useState('');
            const [processNumber, setProcessNumber] = useState('');
            const [format, setFormat] = useState('texto'); 
            const [outputText, setOutputText] = useState(null);
            const [audience, setAudience] = useState('externo');
            
            // Estados de controle
            const [loading, setLoading] = useState(false);
            const [pdfLoading, setPdfLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);
            const [history, setHistory] = useState([]);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            useEffect(() => {
                const privacyAccepted = localStorage.getItem('simpai_privacy_final_v2');
                if (!privacyAccepted) {
                    setActiveModal('initial');
                } else if (!apiKey) {
                    setActiveModal('settings');
                }

                // Listeners para status de conexão
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // PROMPT ATUALIZADO: Inclui instrução rígida sobre não usar Markdown para garantir acessibilidade
            const SYSTEM_PROMPT = `🎯 ATUE COMO SIMPLIFICA AI: Assistente especializado em Linguagem Simples da Justiça Eleitoral brasileira. 
OBJETIVO: Transformar textos jurídicos complexos em conteúdos claros e acessíveis.

REGRAS OBRIGATÓRIAS DE RESPOSTA:
1. Apresente o texto original.
2. Apresente o texto reescrito (linguagem simples, frases curtas, voz ativa).
3. Apresente a explicação técnica das melhorias feitas.
4. ACESSIBILIDADE DE LEITURA (CRÍTICO): Responda apenas em texto puro. NUNCA utilize marcações de Markdown (como **negrito**, *itálico* ou # para títulos). O texto deve estar pronto para leitura por softwares de acessibilidade.

ATENÇÃO AO FORMATO SOLICITADO:
Se o usuário solicitar formato de EMENTA: Use o Padrão CNJ (Cabeçalho em caixa alta, sem nomes de partes, dispositivo com frases curtas e fundamentos legais).`;

            const saveKey = (val) => {
                const cleaned = val.trim().replace(/[\s\u200B-\u200D\uFEFF]/g, '');
                if (cleaned.length > 20) {
                    localStorage.setItem('simpai_key_final_v2', cleaned);
                    setApiKey(cleaned);
                    setActiveModal(null);
                    setError(null);
                } else {
                    alert("A chave parece estar incompleta. Copie o código inteiro do AI Studio.");
                }
            };

            const saveGuidelines = (val) => {
                localStorage.setItem('simpai_guidelines_v1', val);
                setGuidelines(val);
                setActiveModal(null);
            };

            const handlePDFUpload = async (event) => {
                const file = event.target.files[0];
                if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
                    alert("Por favor, selecione um arquivo PDF válido.");
                    return;
                }

                setPdfLoading(true);
                try {
                    // Configura o worker do PDF.js
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    
                    const arrayBuffer = await file.arrayBuffer();
                    const typedarray = new Uint8Array(arrayBuffer);
                    const pdf = await window.pdfjsLib.getDocument({ data: typedarray }).promise;
                    
                    let extractedText = '';
                    
                    // Lê página por página para extrair o texto
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        extractedText += `--- Página ${i} ---\n${pageText}\n\n`;
                    }

                    // Atualiza o estado React diretamente
                    setEditingGuidelines(prev => prev ? `${prev}\n\n${extractedText}` : extractedText);
                    
                } catch (err) {
                    console.error("Erro ao processar PDF:", err);
                    alert("Não foi possível ler o texto deste PDF. O arquivo pode estar protegido, corrompido ou ser uma imagem escaneada.");
                } finally {
                    setPdfLoading(false);
                    event.target.value = ''; // Reseta o input file
                }
            };

            const resetAll = () => {
                localStorage.removeItem('simpai_key_final_v2');
                setApiKey('');
                setOutputText(null);
                setError(null);
                setActiveModal('settings');
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handleSimplify = async () => {
                if (!inputText.trim()) return;
                if (!apiKey) { setActiveModal('settings'); return; }
                
                setLoading(true);
                setError(null);
                setOutputText(null);

                const audienceText = audience === 'externo' ? 'Cidadão Leigo' : 'Servidor Técnico';
                const formatInstruction = format === 'ementa' 
                    ? `Transforme este texto em uma EMENTA padrão CNJ em linguagem simples.` 
                    : `Simplifique este texto.`;

                // Injeção de Contexto das Diretrizes Institucionais
                const contextInjection = guidelines 
                    ? `\n\nDIRETRIZES INSTITUCIONAIS ADICIONAIS (PRIORIDADE MÁXIMA):\nUtilize o seguinte manual/portaria como base principal para as suas escolhas de vocabulário e estilo:\n"""\n${guidelines}\n"""` 
                    : '';

                const promptFinal = `${SYSTEM_PROMPT}${contextInjection}\n\nPúblico-alvo: ${audienceText}\nInstrução: ${formatInstruction}\n\nTexto original:\n${inputText}`;

                try {
                    setLoadingMsg('Verificando chave e modelos...');
                    const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const modelsData = await modelsRes.json();

                    if (!modelsRes.ok) {
                        throw new Error(modelsData.error?.message || "Chave de API inválida ou sem permissão.");
                    }

                    const validModels = modelsData.models.filter(m => 
                        m.supportedGenerationMethods?.includes("generateContent") && 
                        m.name.includes("gemini")
                    );

                    if (validModels.length === 0) {
                        throw new Error("Sua chave é válida, mas não possui acesso aos modelos de texto.");
                    }

                    let selectedModel = '';
                    const modelNames = validModels.map(m => m.name);
                    
                    if (modelNames.includes('models/gemini-1.5-flash')) selectedModel = 'gemini-1.5-flash';
                    else if (modelNames.includes('models/gemini-1.5-flash-latest')) selectedModel = 'gemini-1.5-flash-latest';
                    else if (modelNames.includes('models/gemini-1.5-pro')) selectedModel = 'gemini-1.5-pro';
                    else selectedModel = validModels[0].name.replace('models/', '');

                    setLoadingMsg(`Processando com ${selectedModel}...`);
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptFinal }] }] })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || "Erro na geração do texto.");
                    }

                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (resultText) {
                        
                        // FILTRO DE ACESSIBILIDADE APLICADO AQUI:
                        // Limpa ** (negrito), * (itálico) e # (títulos) para não poluir o leitor de tela e a visualização
                        const cleanText = resultText
                            .replace(/\*\*/g, "")
                            .replace(/\*/g, "")
                            .replace(/### /g, "")
                            .replace(/## /g, "")
                            .replace(/# /g, "");

                        // Imprime no console apenas o texto já tratado e limpo
                        console.log("=== Texto gerado (Limpo para Leitor de Tela) ===");
                        console.log(cleanText);

                        setOutputText(cleanText);
                        
                        // Atualiza o histórico com o texto limpo
                        setHistory(prev => [{
                            id: Date.now(),
                            process: processNumber || 'Sem número',
                            date: new Date().toLocaleTimeString(),
                            original: inputText.substring(0, 60) + '...',
                            result: cleanText
                        }, ...prev].slice(0, 5));

                        if (window.innerWidth < 1024) {
                            setTimeout(() => document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' }), 200);
                        }
                    } else {
                        throw new Error("A IA não retornou resposta clara.");
                    }
                } catch (err) {
                    setError(`Erro de Comunicação: ${err.message}`);
                } finally {
                    setLoading(false);
                    setLoadingMsg('');
                }
            };

            const Modal = ({ title, children, onClose, footer }) => (
                <div className="fixed inset-0 bg-[#001a33]/90 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fade-in text-slate-700">
                    <div className="bg-white max-w-lg w-full rounded-[40px] p-8 md:p-10 shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between mb-6 text-jus">
                            <h3 className="font-black text-xl tracking-tighter uppercase">{title}</h3>
                            {onClose && (
                                <button onClick={onClose} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                                    <Icons.X />
                                </button>
                            )}
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar text-sm space-y-4 leading-relaxed font-medium">
                            {children}
                        </div>
                        {footer && <div className="mt-8">{footer}</div>}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header Institucional */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm px-4 md:px-8 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-jus text-white rounded-xl shadow-lg"><Icons.Scale /></div>
                                <div>
                                    <h1 className="font-extrabold text-lg md:text-xl tracking-tighter text-slate-800 leading-none uppercase italic">Simplifica <span className="text-blue-600">AI</span></h1>
                                    <p className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mt-1">Justiça Eleitoral • Tocantins</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => { setEditingGuidelines(guidelines); setActiveModal('guidelines'); }} className={`relative p-2.5 rounded-full transition-all ${guidelines ? 'text-jus bg-blue-50 border border-blue-100' : 'text-slate-400 hover:text-jus hover:bg-slate-50'}`} title="Diretrizes Institucionais">
                                    <Icons.FileText />
                                    {guidelines && <span className="absolute top-2 right-2 w-2 h-2 bg-blue-500 rounded-full border border-white"></span>}
                                </button>
                                <button onClick={() => setActiveModal('settings')} className={`p-2.5 rounded-full transition-all ${!apiKey ? 'bg-red-100 text-red-600 ring-4 ring-red-50 animate-pulse' : 'text-slate-400 hover:text-jus hover:bg-slate-50'}`} title="Configuração">
                                    <Icons.Settings />
                                </button>
                                <button onClick={() => setActiveModal('initial')} className="hidden sm:flex p-2.5 rounded-full text-slate-400 hover:text-jus" title="Privacidade">
                                    <Icons.Shield />
                                </button>
                                <div className={`flex items-center gap-1.5 px-3 py-1 rounded-full border ml-2 transition-colors duration-300 ${isOnline ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100'}`}>
                                    <div className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    <span className="text-[9px] font-bold uppercase">{isOnline ? 'Online' : 'Offline'}</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in">
                        
                        {/* Coluna Esquerda: Formulário (7 Cols) */}
                        <section className="lg:col-span-7 space-y-6 text-slate-900">
                            <div className="bg-white p-6 md:p-10 rounded-[40px] border border-slate-200 shadow-sm relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-2 h-full bg-jus"></div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                    {/* Número do Processo */}
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-1.5">
                                            <Icons.Hash /> Processo (Opcional)
                                        </label>
                                        <input 
                                            type="text" 
                                            value={processNumber}
                                            onChange={(e) => setProcessNumber(e.target.value)}
                                            placeholder="0600123-45.2024..."
                                            className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-jus outline-none transition-all"
                                        />
                                    </div>
                                    {/* Tipo de Documento */}
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-1.5">
                                            <Icons.BookOpen /> Formato
                                        </label>
                                        <div className="flex p-1.5 bg-slate-100 rounded-2xl">
                                            <button 
                                                onClick={() => setFormat('texto')}
                                                className={`flex-1 py-2 text-[10px] font-bold uppercase rounded-xl transition-all ${format === 'texto' ? 'bg-white text-jus shadow-sm' : 'text-slate-500 hover:bg-slate-200'}`}
                                            >
                                                Texto Livre
                                            </button>
                                            <button 
                                                onClick={() => setFormat('ementa')}
                                                className={`flex-1 py-2 text-[10px] font-bold uppercase rounded-xl transition-all ${format === 'ementa' ? 'bg-white text-jus shadow-sm' : 'text-slate-500 hover:bg-slate-200'}`}
                                            >
                                                Ementa CNJ
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <textarea 
                                    className="w-full h-64 md:h-80 p-6 bg-slate-50 border border-slate-100 rounded-[32px] outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-jus text-sm leading-relaxed transition-all resize-none mb-6 shadow-inner"
                                    placeholder="Cole aqui o seu despacho, decisão ou certidão original..."
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                />
                                
                                <div className="space-y-4">
                                    <div className="flex flex-col md:flex-row gap-4 items-center">
                                        <div className="flex-1 w-full bg-slate-100 p-1.5 rounded-2xl flex gap-1">
                                            <button onClick={() => setAudience('externo')} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${audience === 'externo' ? 'bg-white text-jus shadow-sm' : 'text-slate-400'}`}>Público Cidadão</button>
                                            <button onClick={() => setAudience('interno')} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${audience === 'interno' ? 'bg-white text-jus shadow-sm' : 'text-slate-400'}`}>Público Técnico</button>
                                        </div>
                                        <button onClick={handleSimplify} disabled={loading || !inputText || !isOnline} className={`w-full md:w-auto px-10 py-4 rounded-[20px] font-black text-xs tracking-widest uppercase transition-all flex justify-center items-center gap-3 shadow-xl ${loading || !inputText || !isOnline ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-jus text-white hover:bg-blue-900 shadow-blue-900/20 active:scale-95'}`}>
                                            {loading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <><Icons.Send /> Simplificar</>}
                                        </button>
                                    </div>
                                    <a href="https://gemini.google.com/gem/1LShJIM1Gqgx1glM9GKdh08QW6wde9BPx?usp=sharing" target="_blank" className="flex items-center justify-center gap-2 p-4 w-full rounded-[20px] border-2 border-slate-200 text-[10px] font-black text-slate-500 uppercase hover:bg-slate-50 active:scale-95 transition-all">
                                        <Icons.Gemini /> Abrir no ambiente Google Gemini <Icons.ExternalLink />
                                    </a>
                                </div>
                                {error && <div className="mt-6 p-4 bg-red-50 text-red-700 text-xs font-bold rounded-2xl border border-red-100 flex items-start gap-2 animate-fade-in"><div className="mt-0.5"><Icons.X /></div> <span>{error}</span></div>}
                            </div>

                            {/* Histórico Local */}
                            {history.length > 0 && (
                                <div className="bg-white p-6 md:p-8 rounded-[40px] border border-slate-200 shadow-sm mt-6 animate-fade-in">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-[11px] font-black text-slate-500 uppercase flex items-center gap-2">
                                            <Icons.History /> Histórico de Sessão
                                        </h3>
                                        <button onClick={() => setHistory([])} className="text-slate-400 hover:text-red-500 transition-colors" title="Limpar Histórico">
                                            <Icons.Trash />
                                        </button>
                                    </div>
                                    <div className="space-y-3">
                                        {history.map(item => (
                                            <div key={item.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-blue-200 cursor-pointer transition-colors" onClick={() => {setInputText(item.original); setOutputText(item.result); setProcessNumber(item.process);}}>
                                                <div className="flex items-center gap-3">
                                                    <div className="text-[10px] font-bold text-white bg-jus px-2 py-1 rounded-lg truncate max-w-[80px]">Proc: {item.process}</div>
                                                    <p className="text-xs text-slate-600 truncate max-w-[150px] md:max-w-[200px]">{item.original}</p>
                                                </div>
                                                <span className="text-[10px] font-bold text-slate-400">{item.date}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </section>

                        {/* Coluna Direita: Output (5 Cols) */}
                        <section id="result-area" className="lg:col-span-5">
                            <div className="bg-white p-6 md:p-10 rounded-[40px] border border-slate-200 shadow-sm flex flex-col h-full min-h-[400px] md:min-h-[600px] relative overflow-hidden text-slate-900">
                                
                                {outputText && !loading && (
                                    <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-2">
                                            <Icons.CheckCircle2 /> Resultado da IA
                                        </h2>
                                        <button 
                                            onClick={() => copyToClipboard(outputText)}
                                            className={`flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all shadow-sm ${copied ? 'bg-green-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        >
                                            {copied ? <Icons.CheckCircle2 /> : <Icons.Copy />}
                                            {copied ? 'Copiado!' : 'Copiar Tudo'}
                                        </button>
                                    </div>
                                )}

                                {!outputText && !loading ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-slate-300 opacity-40">
                                        <Icons.Scale />
                                        <p className="text-[10px] font-black uppercase tracking-widest mt-4">Aguardando processamento...</p>
                                    </div>
                                ) : loading ? (
                                    <div className="flex-1 space-y-6 animate-pulse">
                                        <div className="h-4 bg-slate-100 rounded-full w-1/3"></div>
                                        <p className="text-[10px] font-bold text-blue-500 mb-6">{loadingMsg}</p>
                                        <div className="h-4 bg-slate-50 rounded-full w-full"></div>
                                        <div className="h-32 bg-slate-50 rounded-[32px] w-full"></div>
                                    </div>
                                ) : (
                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 prose prose-sm prose-slate max-w-none text-slate-700 whitespace-pre-wrap animate-fade-in leading-relaxed font-medium">
                                        {outputText}
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    {/* Footer Institucional */}
                    <footer className="p-8 md:p-12 text-center bg-white border-t border-slate-100 mt-12 text-slate-400">
                        <div className="max-w-7xl mx-auto flex flex-col items-center gap-8">
                            <div className="flex justify-center gap-8 text-[10px] font-black uppercase tracking-widest">
                                <button onClick={() => setActiveModal('initial')} className="hover:text-jus transition-all">Termos de Uso</button>
                                <button onClick={() => setActiveModal('settings')} className="hover:text-jus transition-all">Configurar</button>
                                <a href="mailto:benedito.palheta@tre-to.jus.br" className="hover:text-jus transition-all">Contacto</a>
                            </div>
                            <div className="bg-slate-50 inline-flex flex-col items-center px-10 py-6 rounded-[32px] border border-slate-200 w-full md:w-auto">
                                <p className="text-[8px] font-black text-slate-400 uppercase mb-2 tracking-[0.2em]">Responsável Institucional pelo Projeto</p>
                                <p className="text-sm md:text-base font-extrabold text-jus leading-tight italic uppercase">Prof. Me. Benedito Palheta dos Santos</p>
                                <p className="text-[10px] font-bold text-blue-500 mt-1 uppercase tracking-tighter">Justiça Eleitoral • Tocantins • 2024</p>
                            </div>
                            <p className="text-[9px] uppercase font-black tracking-widest opacity-40">Pacto Nacional pela Linguagem Simples no Judiciário</p>
                        </div>
                    </footer>

                    {/* Modais */}
                    {activeModal === 'initial' && (
                        <Modal title="Acesso e Privacidade" footer={<button onClick={() => { localStorage.setItem('simpai_privacy_final_v2', 'true'); setActiveModal(apiKey ? null : 'settings'); }} className="w-full bg-jus text-white py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Aceitar e Continuar</button>}>
                            <p><strong>Segurança Jurídica:</strong> Esta ferramenta foi desenvolvida para apoiar a clareza e a transparência na Justiça Eleitoral.</p>
                            <p><strong>Privacidade:</strong> Nenhum dado sensível é armazenado. O processamento é realizado de forma efêmera através da API oficial do Google.</p>
                            <p className="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-blue-800 font-bold">Importante: A revisão humana do texto sugerido pela IA é indispensável antes de qualquer publicação.</p>
                        </Modal>
                    )}

                    {activeModal === 'settings' && (
                        <Modal title="Configuração" footer={<button onClick={() => saveKey(document.getElementById('key-input').value)} className="w-full bg-jus text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Salvar e Ativar</button>}>
                            <div className="space-y-4 text-left">
                                <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100 flex items-start gap-3">
                                    <Icons.Info />
                                    <p className="text-xs font-bold text-blue-900 leading-tight">Para que a ferramenta funcione de forma independente, você precisa de uma chave gratuita do Google AI Studio.</p>
                                </div>
                                <ol className="text-[11px] space-y-2 list-decimal ml-4 font-bold text-slate-500 leading-relaxed">
                                    <li>Abra o site <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-blue-600 underline">Google AI Studio</a>.</li>
                                    <li>Clique no botão <strong>"Get API key"</strong>.</li>
                                    <li>Copie o código (ex: AIzaSy...) e cole abaixo:</li>
                                </ol>
                                <input type="password" id="key-input" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-jus text-sm font-mono shadow-inner" placeholder="Cole a sua chave aqui..." />
                                
                                <div className="pt-4 border-t border-slate-100 text-center">
                                    <button onClick={resetAll} className="flex items-center justify-center gap-2 w-full text-red-500 font-black text-[10px] uppercase hover:text-red-700 transition-all">
                                        <Icons.Trash /> Limpar Chave e Redefinir Sistema
                                    </button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {activeModal === 'guidelines' && (
                        <Modal title="Diretrizes Institucionais" onClose={() => setActiveModal(null)} footer={<button onClick={() => saveGuidelines(editingGuidelines)} className="w-full bg-jus text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Salvar Diretrizes</button>}>
                            <div className="space-y-4 text-left">
                                <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100 flex flex-col gap-3">
                                    <div className="flex items-start gap-3">
                                        <Icons.Info />
                                        <p className="text-xs font-bold text-blue-900 leading-tight">Cole o texto do manual de redação do seu Tribunal ou <strong>carregue um arquivo PDF</strong>. A IA usará este texto como base principal para as adaptações.</p>
                                    </div>
                                    <div className="pt-2 border-t border-blue-200">
                                        <input type="file" id="pdf-upload" accept=".pdf" className="hidden" onChange={handlePDFUpload} />
                                        <button 
                                            onClick={() => document.getElementById('pdf-upload').click()} 
                                            disabled={pdfLoading}
                                            className="flex items-center justify-center gap-2 w-full bg-white text-blue-700 border border-blue-200 py-3 rounded-xl font-bold text-[10px] uppercase shadow-sm hover:bg-blue-100 transition-all disabled:opacity-50"
                                        >
                                            {pdfLoading ? (
                                                <><div className="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div> Extraindo texto...</>
                                            ) : (
                                                <><Icons.Upload /> Carregar Manual em PDF</>
                                            )}
                                        </button>
                                    </div>
                                </div>
                                <textarea 
                                    id="guidelines-input" 
                                    value={editingGuidelines} 
                                    onChange={(e) => setEditingGuidelines(e.target.value)}
                                    className="w-full h-48 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-jus text-sm shadow-inner resize-none custom-scrollbar" 
                                    placeholder="O texto do seu manual aparecerá aqui..."
                                ></textarea>
                                
                                {editingGuidelines && (
                                    <div className="pt-4 border-t border-slate-100 text-center">
                                        <button onClick={() => { localStorage.removeItem('simpai_guidelines_v1'); setGuidelines(''); setEditingGuidelines(''); setActiveModal(null); }} className="flex items-center justify-center gap-2 w-full text-red-500 font-black text-[10px] uppercase hover:text-red-700 transition-all">
                                            <Icons.Trash /> Remover Diretrizes
                                        </button>
                                    </div>
                                )}
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
