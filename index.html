<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIMPLIFICA AI - Justiça Eleitoral</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-jus { background-color: #003366; }
        .text-jus { color: #003366; }
        .border-jus { border-color: #003366; }
        textarea, input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Scale: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>,
            ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 22 3 22 10"/><line x1="10" y1="14" x2="22" y2="3"/></svg>,
            Gemini: () => (
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 22C12 22 12 18 16 14C20 10 24 10 24 10C24 10 20 10 16 6C12 2 12 0 12 0C12 0 12 4 8 8C4 12 0 12 0 12C0 12 4 12 8 16C12 20 12 22 12 22Z" />
                </svg>
            )
        };

        const App = () => {
            const [activeModal, setActiveModal] = useState(null);
            const [inputText, setInputText] = useState('');
            const [outputText, setOutputText] = useState(null);
            const [loading, setLoading] = useState(false);
            const [audience, setAudience] = useState('externo');
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!localStorage.getItem('simpai_v3_privacy_accepted')) {
                    setActiveModal('initial');
                }
            }, []);

            const SYSTEM_PROMPT = `🎯 IDENTIDADE: SIMPLIFICA AI, assistente de Linguagem Simples da Justiça Eleitoral brasileira. 
            OBJETIVO: Transformar textos jurídicos em conteúdos claros e acessíveis ao cidadão.
            REGRAS: 
            1. Texto original. 
            2. Texto reescrito (voz ativa, ordem direta, frases curtas). 
            3. Explicação técnica das melhorias.
            CONTATO INSTITUCIONAL: Prof. Me. Benedito Palheta dos Santos (benedito.palheta@tre-to.jus.br).`;

            const acceptTerms = () => {
                localStorage.setItem('simpai_v3_privacy_accepted', 'true');
                setActiveModal(null);
            };

            const handleSimplify = async () => {
                if (!inputText.trim()) return;
                setLoading(true);
                setError(null);
                const apiKey = ""; 

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Público Alvo: ${audience === 'externo' ? 'Cidadão Leigo' : 'Servidor Técnico'}. Texto: ${inputText}` }] }],
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                        })
                    });

                    const result = await response.json();
                    if (result.error) throw new Error(result.error.message);
                    
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        setOutputText(text);
                        if (window.innerWidth < 1024) {
                            setTimeout(() => {
                                document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
                            }, 100);
                        }
                    } else {
                        throw new Error("Falha ao processar.");
                    }
                } catch (err) {
                    setError("Erro ao processar. Tente novamente.");
                } finally {
                    setLoading(false);
                }
            };

            const Modal = ({ title, children, onClose, showAccept = false }) => (
                <div className="fixed inset-0 bg-[#001a33]/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white max-w-lg w-full rounded-[32px] md:rounded-[40px] p-6 md:p-10 shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between mb-6">
                            <h3 className="font-black text-xl md:text-2xl text-jus tracking-tighter uppercase">{title}</h3>
                            {!showAccept && (
                                <button onClick={onClose} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                                    <Icons.X />
                                </button>
                            )}
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar text-sm text-slate-600 space-y-4">
                            {children}
                        </div>
                        {showAccept ? (
                            <button 
                                onClick={acceptTerms}
                                className="w-full mt-8 bg-jus text-white py-4 md:py-5 rounded-2xl font-black text-xs md:text-sm tracking-[0.2em] uppercase shadow-xl hover:bg-blue-900 transition-all"
                            >
                                Aceitar e Continuar
                            </button>
                        ) : (
                            <button 
                                onClick={onClose}
                                className="w-full mt-8 bg-slate-100 text-slate-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest"
                            >
                                Fechar
                            </button>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col overflow-x-hidden">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm px-4 md:px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-3">
                                <div className="p-1.5 md:p-2 bg-jus text-white rounded-xl shadow-lg"><Icons.Scale /></div>
                                <div>
                                    <h1 className="font-black text-lg md:text-xl tracking-tighter text-slate-800 leading-none">SIMPLIFICA <span className="text-blue-600">AI</span></h1>
                                    <p className="text-[8px] md:text-[9px] text-slate-400 uppercase tracking-widest font-bold mt-0.5">Justiça Eleitoral</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => setActiveModal('privacy')}
                                    className="hidden sm:flex items-center gap-1 text-[10px] font-bold text-slate-400 uppercase hover:text-jus transition-colors"
                                >
                                    <Icons.Shield /> Privacidade
                                </button>
                                <div className="h-4 w-px bg-slate-200 hidden sm:block mx-2"></div>
                                <div className="flex items-center gap-1.5 px-3 py-1 bg-green-50 text-green-700 rounded-full border border-green-100">
                                    <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="text-[9px] font-bold uppercase tracking-tighter">Online</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Layout */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 animate-fade-in">
                        
                        {/* Input Area */}
                        <section className="lg:col-span-7 space-y-6">
                            <div className="bg-white p-5 md:p-8 rounded-[24px] md:rounded-[40px] border border-slate-200 shadow-sm relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-jus"></div>
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] flex items-center gap-2">
                                        <Icons.FileText /> Entrada de Texto
                                    </h2>
                                </div>
                                
                                <textarea 
                                    className="w-full h-64 md:h-96 p-4 md:p-6 bg-slate-50 border border-slate-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-jus text-sm md:text-base leading-relaxed transition-all resize-none mb-6"
                                    placeholder="Cole aqui o texto jurídico para simplificar..."
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                />

                                <div className="space-y-4">
                                    <div className="bg-slate-50 p-2 rounded-2xl md:rounded-3xl border border-slate-100">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2 ml-3 tracking-[0.1em]">Nível de Simplificação</p>
                                        <div className="flex gap-1">
                                            <button 
                                                onClick={() => setAudience('externo')}
                                                className={`flex-1 py-3 md:py-4 text-[10px] md:text-xs font-black uppercase tracking-widest rounded-xl md:rounded-2xl transition-all ${audience === 'externo' ? 'bg-white text-jus shadow-md' : 'text-slate-400 hover:bg-white/50'}`}
                                            >Cidadão</button>
                                            <button 
                                                onClick={() => setAudience('interno')}
                                                className={`flex-1 py-3 md:py-4 text-[10px] md:text-xs font-black uppercase tracking-widest rounded-xl md:rounded-2xl transition-all ${audience === 'interno' ? 'bg-white text-jus shadow-md' : 'text-slate-400 hover:bg-white/50'}`}
                                            >Técnico</button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <button 
                                            onClick={handleSimplify}
                                            disabled={loading || !inputText}
                                            className={`py-5 rounded-2xl md:rounded-[30px] font-black text-[10px] md:text-xs tracking-[0.15em] uppercase transition-all flex justify-center items-center gap-3 shadow-xl ${loading || !inputText ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-jus text-white hover:bg-blue-900 active:scale-95'}`}
                                        >
                                            {loading ? <div className="w-5 h-5 border-3 border-white/30 border-t-white rounded-full animate-spin"></div> : <><Icons.Send /> Simplificar Localmente</>}
                                        </button>

                                        <a 
                                            href="https://gemini.google.com/gem/1LShJIM1Gqgx1glM9GKdh08QW6wde9BPx?usp=sharing"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="py-5 rounded-2xl md:rounded-[30px] font-black text-[10px] md:text-xs tracking-[0.15em] uppercase transition-all flex justify-center items-center gap-3 border-2 border-slate-200 bg-white text-slate-600 hover:bg-slate-50 active:scale-95 shadow-lg shadow-slate-200/50"
                                        >
                                            <Icons.Gemini /> 
                                            Usar Plataforma Gemini
                                            <Icons.ExternalLink />
                                        </a>
                                    </div>
                                </div>
                                {error && <p className="mt-4 text-center text-red-600 font-bold text-xs">{error}</p>}
                            </div>
                        </section>

                        {/* Result Area */}
                        <section id="result-area" className="lg:col-span-5">
                            <div className="bg-white p-5 md:p-8 rounded-[24px] md:rounded-[40px] border border-slate-200 shadow-sm flex flex-col h-full min-h-[400px] md:min-h-[600px] relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 md:p-6 opacity-20">
                                    <Icons.Scale />
                                </div>
                                <h2 className="text-[10px] md:text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Resultado</h2>
                                
                                {!outputText && !loading ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-slate-300 space-y-4 p-8 text-center">
                                        <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center">
                                            <Icons.FileText />
                                        </div>
                                        <p className="text-[10px] font-black uppercase tracking-widest leading-relaxed max-w-[150px]">
                                            O conteúdo simplificado será exibido aqui
                                        </p>
                                    </div>
                                ) : loading ? (
                                    <div className="flex-1 space-y-6 animate-pulse">
                                        <div className="h-4 bg-slate-100 rounded-full w-1/3"></div>
                                        <div className="space-y-3">
                                            <div className="h-4 bg-slate-50 rounded-full w-full"></div>
                                            <div className="h-4 bg-slate-50 rounded-full w-5/6"></div>
                                            <div className="h-4 bg-slate-50 rounded-full w-4/6"></div>
                                        </div>
                                        <div className="h-4 bg-slate-100 rounded-full w-1/2 mt-12"></div>
                                        <div className="h-40 bg-slate-50 rounded-3xl w-full"></div>
                                    </div>
                                ) : (
                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-6">
                                        <div className="prose prose-sm prose-slate max-w-none text-slate-700 whitespace-pre-wrap leading-relaxed animate-fade-in text-sm md:text-base">
                                            {outputText}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="p-8 md:p-12 text-center bg-white border-t border-slate-100 mt-12">
                        <div className="max-w-7xl mx-auto space-y-10">
                            <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8">
                                <button onClick={() => setActiveModal('terms')} className="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-jus transition-colors">Termos de Uso</button>
                                <div className="hidden md:block h-4 w-px bg-slate-200"></div>
                                <button onClick={() => setActiveModal('privacy')} className="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-jus transition-colors">Privacidade</button>
                                <div className="hidden md:block h-4 w-px bg-slate-200"></div>
                                <a href="mailto:benedito.palheta@tre-to.jus.br" className="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-jus transition-colors">Contato Técnico</a>
                            </div>

                            <div className="flex flex-col items-center gap-4">
                                <div className="bg-slate-50 inline-flex flex-col items-center px-6 md:px-10 py-5 rounded-[24px] md:rounded-[32px] border border-slate-100 w-full md:w-auto">
                                    <p className="text-[8px] md:text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Responsável Institucional</p>
                                    <p className="text-sm md:text-base font-extrabold text-jus">Prof. Me. Benedito Palheta dos Santos</p>
                                    <p className="text-[10px] font-bold text-blue-500 mt-1">benedito.palheta@tre-to.jus.br</p>
                                </div>
                                <p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Justiça Eleitoral • Tocantins • 2024</p>
                            </div>
                        </div>
                    </footer>

                    {/* Modals */}
                    {activeModal === 'initial' && (
                        <Modal title="Boas-vindas e LGPD" showAccept={true}>
                            <p><strong>Segurança e Transparência:</strong> Este sistema auxilia na simplificação da linguagem judiciária.</p>
                            <p><strong>Privacidade:</strong> Nenhum dado sensível é armazenado. O processamento é em tempo real via IA.</p>
                            <p><strong>Uso Ético:</strong> Recomendamos não inserir nomes completos ou dados sensíveis.</p>
                            <p className="p-3 bg-blue-50 text-blue-800 rounded-xl italic font-medium">Ao aceitar, você concorda com nossos Termos de Uso e Política de Privacidade.</p>
                        </Modal>
                    )}

                    {activeModal === 'terms' && (
                        <Modal title="Termos de Uso" onClose={() => setActiveModal(null)}>
                            <p className="font-bold">1. Finalidade</p>
                            <p>O SIMPLIFICA AI é uma ferramenta de apoio. O resultado é uma sugestão.</p>
                            <p className="font-bold">2. Responsabilidade</p>
                            <p>O usuário é responsável pela revisão e publicação oficial.</p>
                            <p className="font-bold">3. Direitos Autorais</p>
                            <p>O prompt original é de autoria do Prof. Me. Benedito Palheta dos Santos.</p>
                        </Modal>
                    )}

                    {activeModal === 'privacy' && (
                        <Modal title="Política de Privacidade" onClose={() => setActiveModal(null)}>
                            <p className="font-bold text-jus">LGPD e Proteção de Dados</p>
                            <p><strong>Coleta:</strong> Não coletamos metadados ou identificadores.</p>
                            <p><strong>Armazenamento:</strong> Aplicação stateless. Dados limpos ao fechar a aba.</p>
                            <p><strong>Terceiros:</strong> Dados enviados via API criptografada para o Google Gemini.</p>
                        </Modal>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
